<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WinUtils Admin | Moderation Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #050505;
            color: #fff;
            font-family: 'Inter', sans-serif;
        }

        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .glass-heavy {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.12);
        }

        .stat-card {
            transition: transform 0.2s;
        }

        .stat-card:hover {
            transform: translateY(-2px);
        }

        #commandOutput {
            font-family: 'Consolas', monospace;
        }
    </style>
</head>

<body class="flex h-screen overflow-hidden">
    <!-- Sidebar -->
    <div class="w-64 h-full glass p-6 flex flex-col shrink-0">
        <h1 class="font-bold text-xl mb-2 tracking-tighter"><span class="text-blue-400">WIN</span>UTILS</h1>
        <p class="text-xs text-gray-600 mb-8">Admin Panel</p>
        <nav class="space-y-2 flex-1">
            <a href="#" onclick="showSection('users')"
                class="block px-4 py-2.5 rounded-lg text-blue-400 font-semibold bg-blue-500/10 text-sm">Users</a>
            <a href="#" onclick="showSection('analytics')"
                class="block px-4 py-2.5 rounded-lg text-gray-400 hover:text-white hover:bg-white/5 text-sm transition">Analytics</a>
            <a href="#" onclick="showSection('security')"
                class="block px-4 py-2.5 rounded-lg text-gray-400 hover:text-white hover:bg-white/5 text-sm transition">Security</a>
            <a href="#" onclick="showSection('subscriptions')"
                class="block px-4 py-2.5 rounded-lg text-gray-400 hover:text-white hover:bg-white/5 text-sm transition">Subscriptions</a>
        </nav>
        <div class="pt-6 border-t border-white/10">
            <p id="adminRole" class="text-xs text-gray-600">Not signed in</p>
            <button onclick="adminSignIn()" id="adminSignInBtn"
                class="mt-2 w-full bg-white/10 text-white text-xs py-2 rounded-lg hover:bg-white/20 transition">Sign
                In</button>
        </div>
    </div>

    <!-- Main Content -->
    <div class="flex-1 p-8 overflow-y-auto">
        <!-- Users Section -->
        <div id="section-users">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-3xl font-bold">User Management</h2>
                <input type="text" id="searchInput" placeholder="Search UID or Email..."
                    class="glass px-4 py-2.5 rounded-xl text-sm w-80 outline-none focus:border-blue-500/50 transition"
                    onkeyup="if(event.key==='Enter') searchUser()">
            </div>

            <!-- Stats -->
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8" id="statsGrid">
                <div class="glass p-6 rounded-2xl stat-card">
                    <p class="text-gray-500 text-xs uppercase tracking-wider">Total Users</p>
                    <p class="text-3xl font-bold mt-2" id="statTotalUsers">—</p>
                </div>
                <div class="glass p-6 rounded-2xl stat-card">
                    <p class="text-gray-500 text-xs uppercase tracking-wider">Active Subs</p>
                    <p class="text-3xl font-bold mt-2 text-green-400" id="statActiveSubs">—</p>
                </div>
                <div class="glass p-6 rounded-2xl stat-card">
                    <p class="text-gray-500 text-xs uppercase tracking-wider">Monthly Revenue</p>
                    <p class="text-3xl font-bold mt-2" id="statRevenue">—</p>
                </div>
                <div class="glass p-6 rounded-2xl stat-card">
                    <p class="text-gray-500 text-xs uppercase tracking-wider">Piracy Flags</p>
                    <p class="text-3xl font-bold mt-2 text-red-500" id="statPiracy">—</p>
                </div>
            </div>

            <!-- User Table -->
            <div class="glass rounded-2xl overflow-hidden mb-8">
                <table class="w-full text-left text-sm">
                    <thead class="bg-white/5 text-gray-400">
                        <tr>
                            <th class="p-4">User</th>
                            <th class="p-4">Plan</th>
                            <th class="p-4">Daily Usage</th>
                            <th class="p-4">Status</th>
                            <th class="p-4">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="userTableBody" class="divide-y divide-white/5">
                        <tr>
                            <td class="p-4 text-gray-500 text-center" colspan="5">Sign in as admin to load users</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- Command Console -->
            <div class="glass p-6 rounded-2xl">
                <h3 class="font-bold text-yellow-500 mb-4 text-sm uppercase tracking-wider">Admin Console</h3>
                <div class="flex space-x-2 mb-4">
                    <input type="text" id="commandInput"
                        placeholder="/grant-pro uid  |  /ban uid reason  |  /reset-usage uid"
                        class="flex-1 bg-black/50 border border-white/10 px-4 py-2.5 rounded-lg text-sm font-mono outline-none focus:border-yellow-500/50 transition"
                        onkeyup="if(event.key==='Enter') runCommand()">
                    <button onclick="runCommand()"
                        class="bg-yellow-500 text-black px-6 py-2.5 rounded-lg font-bold text-sm hover:bg-yellow-400 transition">Run</button>
                </div>
                <div id="commandOutput"
                    class="bg-black/50 rounded-lg p-4 text-xs text-green-400 max-h-40 overflow-y-auto">
                    <p class="text-gray-600">Ready. Type a command above.</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-functions-compat.js"></script>

    <script>
        // ═══════════════════════════════════════════════
        // FIREBASE CONFIG — Same as website
        // ═══════════════════════════════════════════════
        const firebaseConfig = {
            apiKey: "AIzaSyCg_tYP-GGU9dr6F0f8GLBqt4GQ3nyPdSU",
            authDomain: "winutilsteam-e94f4.firebaseapp.com",
            projectId: "winutilsteam-e94f4",
            storageBucket: "winutilsteam-e94f4.firebasestorage.app",
            messagingSenderId: "126716782370",
            appId: "1:126716782370:web:31c7c83cf0c1786bec277b",
            measurementId: "G-ZF6B1JJKPC"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const fncs = firebase.functions();

        let isAdmin = false;

        // ═══════════════════════════════════════════════
        // Auth
        // ═══════════════════════════════════════════════
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                const adminDoc = await db.collection('admins').doc(user.uid).get();
                if (adminDoc.exists) {
                    isAdmin = true;
                    document.getElementById('adminRole').textContent = `${adminDoc.data().role} — ${user.email}`;
                    document.getElementById('adminSignInBtn').textContent = 'Sign Out';
                    document.getElementById('adminSignInBtn').onclick = () => auth.signOut();
                    loadUsers();
                    loadStats();
                } else {
                    log('Access denied. You are not an admin.');
                }
            } else {
                isAdmin = false;
                document.getElementById('adminRole').textContent = 'Not signed in';
                document.getElementById('adminSignInBtn').textContent = 'Sign In';
                document.getElementById('adminSignInBtn').onclick = adminSignIn;
            }
        });

        function adminSignIn() {
            auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
        }

        // ═══════════════════════════════════════════════
        // Load Users
        // ═══════════════════════════════════════════════
        async function loadUsers() {
            const snap = await db.collection('users').orderBy('createdAt', 'desc').limit(50).get();
            const tbody = document.getElementById('userTableBody');
            tbody.innerHTML = '';
            snap.forEach(doc => {
                const d = doc.data();
                const tr = document.createElement('tr');
                tr.innerHTML = `
                <td class="p-4">
                    <p class="font-semibold">${d.displayName || d.email || 'Unknown'}</p>
                    <p class="text-xs text-gray-600 mt-0.5">${doc.id.slice(0, 12)}...</p>
                </td>
                <td class="p-4">
                    <span class="px-2 py-1 rounded text-xs font-bold ${d.plan === 'pro' ? 'bg-purple-500/20 text-purple-400' : 'bg-blue-500/20 text-blue-400'}">${(d.plan || 'free').toUpperCase()}</span>
                </td>
                <td class="p-4 text-gray-400">${d.dailyUsageMinutes || 0} min</td>
                <td class="p-4">
                    ${d.banned ? '<span class="text-red-400">Banned</span>' : d.piracyFlag ? '<span class="text-yellow-400">Flagged</span>' : '<span class="text-green-400">Active</span>'}
                </td>
                <td class="p-4 space-x-1">
                    <button onclick="quickAction('grant-pro','${doc.id}')" class="bg-purple-500/20 text-purple-400 px-2 py-1 rounded text-xs hover:bg-purple-500/30">Pro</button>
                    <button onclick="quickAction('ban','${doc.id}')" class="bg-red-500/20 text-red-400 px-2 py-1 rounded text-xs hover:bg-red-500/30">Ban</button>
                    <button onclick="quickAction('reset-usage','${doc.id}')" class="bg-white/10 text-white px-2 py-1 rounded text-xs hover:bg-white/20">Reset</button>
                </td>`;
                tbody.appendChild(tr);
            });
        }

        // ═══════════════════════════════════════════════
        // Stats
        // ═══════════════════════════════════════════════
        async function loadStats() {
            const snap = await db.collection('users').get();
            let total = 0, proCount = 0, flagged = 0;
            snap.forEach(doc => {
                total++;
                const d = doc.data();
                if (d.plan === 'pro') proCount++;
                if (d.piracyFlag) flagged++;
            });
            document.getElementById('statTotalUsers').textContent = total;
            document.getElementById('statActiveSubs').textContent = proCount;
            document.getElementById('statRevenue').textContent = `$${proCount * 3}`;
            document.getElementById('statPiracy').textContent = flagged;
        }

        // ═══════════════════════════════════════════════
        // Admin Commands
        // ═══════════════════════════════════════════════
        async function runCommand() {
            const input = document.getElementById('commandInput').value.trim();
            if (!input.startsWith('/')) { log('Commands must start with /'); return; }

            const parts = input.split(' ');
            const cmd = parts[0].replace('/', '');
            const targetUid = parts[1];
            const reason = parts.slice(2).join(' ');

            if (!targetUid && cmd !== 'help') { log('Usage: /command uid [reason]'); return; }

            log(`> ${input}`);

            try {
                const adminCmd = fncs.httpsCallable('adminCommand');
                const result = await adminCmd({ command: cmd, targetUid, reason });
                log(result.data.message || JSON.stringify(result.data));
                if (cmd === 'view' && result.data.user) {
                    log(JSON.stringify(result.data.user, null, 2));
                }
                loadUsers();
                loadStats();
            } catch (err) {
                log(`Error: ${err.message}`);
            }

            document.getElementById('commandInput').value = '';
        }

        async function quickAction(cmd, uid) {
            log(`> /${cmd} ${uid}`);
            try {
                const adminCmd = fncs.httpsCallable('adminCommand');
                const result = await adminCmd({ command: cmd, targetUid: uid });
                log(result.data.message);
                loadUsers();
                loadStats();
            } catch (err) { log(`Error: ${err.message}`); }
        }

        async function searchUser() {
            const q = document.getElementById('searchInput').value.trim();
            if (!q) { loadUsers(); return; }
            log(`Searching for: ${q}`);
            // Try by UID first
            const doc = await db.collection('users').doc(q).get();
            if (doc.exists) {
                const d = doc.data();
                log(`Found: ${d.email} | Plan: ${d.plan} | Banned: ${d.banned}`);
            } else {
                // Search by email
                const snap = await db.collection('users').where('email', '==', q).limit(1).get();
                if (!snap.empty) {
                    const d = snap.docs[0].data();
                    log(`Found: ${d.email} (${snap.docs[0].id}) | Plan: ${d.plan}`);
                } else {
                    log('User not found.');
                }
            }
        }

        function showSection(name) { /* placeholder for multi-section navigation */ }

        function log(msg) {
            const out = document.getElementById('commandOutput');
            out.innerHTML += `<p>${msg}</p>`;
            out.scrollTop = out.scrollHeight;
        }
    </script>
</body>

</html>
